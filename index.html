<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GET TAXI KOVAI - Enterprise Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:15px;
margin:0;
}

.invoice{
max-width:850px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #eee;
padding-bottom:10px;
}

/* BEAUTIFUL BRAND FONT */
.company{
font-size:30px;
font-weight:700;
font-family:'Poppins',sans-serif;
letter-spacing:1px;
color:#111;
}

.tag{
color:#777;
font-size:14px;
}

.logo{height:55px;}

.section{margin-top:18px;}

.row{
display:flex;
justify-content:space-between;
border-bottom:1px dashed #ddd;
padding:6px 0;
}

input{
border:none;
outline:none;
text-align:right;
font-size:15px;
width:160px;
}

.total{
font-size:26px;
font-weight:bold;
text-align:right;
margin-top:15px;
}

.mapbox{
height:200px;
border:1px solid #ddd;
border-radius:8px;
display:flex;
justify-content:center;
align-items:center;
background:#fafafa;
overflow:hidden;
}

.mapbox img{
max-width:100%;
max-height:100%;
}

.footer{
margin-top:25px;
background:#f1f3f5;
padding:14px;
border-radius:8px;
text-align:center;
font-size:13px;
color:#555;
line-height:1.6;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
background:black;
color:white;
border-radius:6px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="invoice" id="invoice">

<!-- HEADER -->
<div class="header">
<div>
<div class="company">GET TAXI KOVAI</div>
<div class="tag">Taxi and Travel Partner</div>
</div>

<img src="logo.png" class="logo">
</div>

<!-- INVOICE INFO -->
<div class="section">
<div class="row"><span>Invoice No</span><span id="invoiceNo"></span></div>
<div class="row"><span>Date</span><span id="dateNow"></span></div>
</div>

<!-- CUSTOMER -->
<div class="section">

<div class="row">
<span>Customer Name</span>
<input id="customer">
</div>

<div class="row"><span>Driver Name</span><input></div>
<div class="row"><span>Vehicle</span><input></div>
<div class="row"><span>Cab Number</span><input></div>

</div>

<!-- CHARGES -->
<div class="section">
<b>Charges</b>

<div class="row"><span>Trip Fare</span><input type="number" class="calc"></div>
<div class="row"><span>Toll Charges</span><input type="number" class="calc"></div>
<div class="row"><span>Parking</span><input type="number" class="calc"></div>
<div class="row"><span>Other Charges</span><input type="number" class="calc"></div>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

</div>

<!-- MAP -->
<div class="section">
<b>Route Map</b>

<div class="mapbox">
<img id="mapPreview">
</div>

<button onclick="mapUpload.click()">Upload Map</button>
<input id="mapUpload" class="hidden" type="file">
</div>

<!-- FOOTER -->
<div class="footer">
GET TAXI KOVAI 🚖<br>
Taxi and Travel Partner<br>
Coimbatore, Tamil Nadu<br>
Phone: 90437 43777
</div>

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="shareWA()">Share WhatsApp</button>

</div>

<script>

/* INVOICE NUMBER */
let count = localStorage.getItem("invoiceCount") || 0;
count++;
localStorage.setItem("invoiceCount",count);

let invoiceNo="GTK-"+String(count).padStart(4,"0");
document.getElementById("invoiceNo").innerText=invoiceNo;

/* DATE */
document.getElementById("dateNow").innerText =
new Date().toLocaleString();

/* CUSTOMER SAVE */
let cust=document.getElementById("customer");
cust.value=localStorage.getItem("lastCustomer")||"";

cust.addEventListener("input",()=>{
localStorage.setItem("lastCustomer",cust.value);
});

/* AUTO TOTAL */
document.querySelectorAll(".calc").forEach(el=>{
el.addEventListener("input",calcTotal);
});

function calcTotal(){
let total=0;
document.querySelectorAll(".calc").forEach(el=>{
total+=Number(el.value)||0;
});
document.getElementById("total").innerText=total;
}

/* MAP */
mapUpload.onchange=e=>{
mapPreview.src=URL.createObjectURL(e.target.files[0]);
};

/* PDF */
function downloadPDF(){
html2pdf().from(invoice).set({
margin:0.3,
filename:invoiceNo+".pdf",
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4'}
}).save();
}

/* WHATSAPP */
function shareWA(){
let total=document.getElementById("total").innerText;

let msg=`GET TAXI KOVAI
Invoice: ${invoiceNo}
Total Amount: ₹${total}
Thank you for travelling with us.`;

window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
