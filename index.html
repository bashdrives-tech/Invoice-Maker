<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta charset="UTF-8">

<title>GET TAXI KOVAI Invoice</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#eef2f7;
font-family:Arial,Helvetica,sans-serif;
margin:0;
padding:15px;
}

.invoice{
width:210mm;
min-height:297mm;
background:white;
margin:auto;
padding:18mm;
box-shadow:0 0 12px rgba(0,0,0,.15);
position:relative;
}

.topbar,.bottombar{
height:10px;
background:#1e63b6;
position:absolute;
left:0;
right:0;
}

.topbar{top:0;}
.bottombar{bottom:0;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.brand{
font-size:30px;
font-weight:700;
color:#1e63b6;
letter-spacing:1px;
}

.subtitle{
color:#666;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

label{
font-size:13px;
color:#444;
}

input{
width:100%;
border:none;
border-bottom:1px solid #ccc;
padding:6px 2px;
font-size:14px;
background:transparent;
}

.kmgrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:12px;
}

.mapbox{
width:50mm;
height:40mm;
border:1px solid #aaa;
overflow:hidden;
}

.mapbox img{
width:100%;
height:100%;
object-fit:cover;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#1e63b6;
color:white;
padding:8px;
text-align:left;
}

td{
border-bottom:1px solid #ddd;
padding:8px;
}

.amount{
text-align:right;
}

.total{
text-align:right;
font-size:22px;
font-weight:bold;
margin-top:12px;
}

.footer{
position:absolute;
bottom:18mm;
left:18mm;
right:18mm;
text-align:center;
font-size:13px;
border-top:2px solid #1e63b6;
padding-top:6px;
}

.buttons{
text-align:center;
margin-top:15px;
}

button{
background:#1e63b6;
color:white;
border:none;
padding:10px 16px;
margin:5px;
border-radius:6px;
}

.fileinput{
display:none;
}

</style>
</head>

<body>

<div id="invoice" class="invoice">

<div class="topbar"></div>

<div class="header">
<div>
<div class="brand">GET TAXI KOVAI</div>
<div class="subtitle">Your Trusted Travel Partner</div>
</div>
<img src="logo.png" height="60">
</div>

<div class="grid">
<div>
<label>Customer Name</label>
<input>
<label>Pickup Location</label>
<input>
<label>Drop Location</label>
<input>
</div>

<div>
<label>Pickup Date & Time</label>
<input type="datetime-local">
<label>Drop Date & Time</label>
<input type="datetime-local">
<label>Vehicle / Driver</label>
<input>
</div>
</div>

<div class="kmgrid">
<div>
<label>Opening KM</label>
<input id="openkm" type="number" oninput="calcKM()">
</div>
<div>
<label>Closing KM</label>
<input id="closekm" type="number" oninput="calcKM()">
</div>
<div>
<label>Total KM</label>
<input id="totalkm" readonly>
</div>
</div>

<div class="grid">

<div>
<table>
<tr><th>Description</th><th class="amount">Amount ₹</th></tr>
<tr><td>Trip Fare</td><td><input class="amt" oninput="calcTotal()"></td></tr>
<tr><td>Toll</td><td><input class="amt" oninput="calcTotal()"></td></tr>
<tr><td>Parking</td><td><input class="amt" oninput="calcTotal()"></td></tr>
<tr><td>Other</td><td><input class="amt" oninput="calcTotal()"></td></tr>
</table>

<div class="total">
Total ₹ <span id="grand">0</span>
</div>
</div>

<div>
<label>Route Map</label>
<div class="mapbox">
<img id="mapPreview">
</div>
<button onclick="document.getElementById('mapUpload').click()">Upload Map</button>
<input id="mapUpload" class="fileinput" type="file" accept="image/*" onchange="loadMap(event)">
</div>

</div>

<div class="footer">
286 B, Diwan Bahadur Road, RS Puram, Coimbatore – 641002 |
📞 +91 90437 43777 |
✉ Bookings@gettaxikovai.in |
🌐 www.gettaxikovai.in
</div>

<div class="bottombar"></div>

</div>

<div class="buttons">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

function calcKM(){
let o=parseFloat(openkm.value)||0;
let c=parseFloat(closekm.value)||0;
totalkm.value=(c>o)?(c-o):0;
}

function calcTotal(){
let total=0;
document.querySelectorAll(".amt").forEach(e=>{
total+=parseFloat(e.value)||0;
});
grand.innerText=total.toFixed(2);
}

function loadMap(e){
mapPreview.src=URL.createObjectURL(e.target.files[0]);
}

async function downloadPDF(){
const { jsPDF } = window.jspdf;
const canvas=await html2canvas(document.getElementById("invoice"),{scale:2});
const img=canvas.toDataURL("image/png");

const pdf=new jsPDF('p','mm','a4');
pdf.addImage(img,'PNG',0,0,210,297);
pdf.save("GetTaxiKovai_Invoice.pdf");
}

</script>

</body>
</html>
