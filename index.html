<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GET TAXI KOVAI Invoice</title>

<style>

:root{
--primary:#0f172a;
--accent:#2563eb;
--light:#f8fafc;
--border:#e5e7eb;
}

body{
background:var(--light);
font-family:Arial,Helvetica,sans-serif;
margin:0;
padding:20px;
}

.invoice-container{
max-width:850px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
border-top:6px solid var(--accent);
box-shadow:0 0 20px rgba(0,0,0,0.08);
}

.company-header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
padding-bottom:15px;
margin-bottom:20px;
}

.company-name{
font-size:28px;
font-weight:800;
color:var(--primary);
}

.company-tag{
font-size:13px;
color:#64748b;
}

label{
font-size:14px;
color:#444;
}

input{
width:100%;
border:none;
border-bottom:1px solid #ccc;
padding:6px;
font-size:14px;
margin-bottom:12px;
}

.invoice-row{
display:flex;
justify-content:space-between;
border-bottom:1px dashed var(--border);
padding:8px 0;
}

.invoice-row input{
width:120px;
text-align:right;
}

.total-box{
text-align:right;
font-size:22px;
font-weight:bold;
margin-top:15px;
color:var(--primary);
}

.route-box{
border:1px solid var(--border);
border-radius:8px;
height:200px;
background:#fafafa;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.route-box img{
max-width:100%;
}

button{
background:var(--accent);
color:white;
border:none;
padding:10px 15px;
margin-top:15px;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.invoice-footer{
margin-top:45px;
padding-top:12px;
border-top:2px solid black;
text-align:center;
font-size:12px;
letter-spacing:0.3px;
}

@media print{

button,
.upload-btn{
display:none !important;
}

body{
background:white;
}

.invoice-container{
box-shadow:none;
border-radius:0;
}

}

</style>
</head>

<body>

<div class="invoice-container" id="invoice">

<div class="company-header">

<div>
<div class="company-name">GET TAXI KOVAI</div>
<div class="company-tag">Taxi & Travel Partner</div>
</div>

<img src="logo.png" height="55">

</div>

<label>Invoice No</label>
<input placeholder="GTK-0001">

<label>Customer Name</label>
<input id="customer">

<label>Driver Name</label>
<input>

<label>Vehicle</label>
<input>

<label>Cab Number</label>
<input>

<h3>Trip Timeline</h3>

<label>Pickup Date & Time</label>
<input type="datetime-local">

<label>Drop Date & Time</label>
<input type="datetime-local">

<h3>Charges</h3>

<div class="invoice-row">
<span>Trip Fare</span>
<input id="fare" type="number" oninput="calc()">
</div>

<div class="invoice-row">
<span>Toll Charges</span>
<input id="toll" type="number" oninput="calc()">
</div>

<div class="invoice-row">
<span>Parking</span>
<input id="parking" type="number" oninput="calc()">
</div>

<div class="invoice-row">
<span>Other Charges</span>
<input id="other" type="number" oninput="calc()">
</div>

<div class="total-box">
Total ₹ <span id="total">0</span>
</div>

<h3>Route Map</h3>

<div class="route-box">
<img id="mapPreview">
</div>

<input type="file" class="upload-btn" onchange="loadMap(event)">

<br>

<button onclick="downloadPDF()">Download Invoice</button>
<button onclick="shareWhatsApp()">Share WhatsApp</button>

<div class="invoice-footer">
GET TAXI KOVAI | 286 B, Diwan Bahadur Road, RS Puram, Coimbatore – 641002 |
📞 +91 90437 43777 |
✉ Bookings@gettaxikovai.in |
🌐 www.gettaxikovai.in
</div>

</div>

<script>

function calc(){

let fare=parseFloat(document.getElementById("fare").value)||0
let toll=parseFloat(document.getElementById("toll").value)||0
let parking=parseFloat(document.getElementById("parking").value)||0
let other=parseFloat(document.getElementById("other").value)||0

let total=fare+toll+parking+other

document.getElementById("total").innerText=total

}

function loadMap(event){

let img=document.getElementById("mapPreview")
img.src=URL.createObjectURL(event.target.files[0])

}

function downloadPDF(){

window.print()

}

function shareWhatsApp(){

let total=document.getElementById("total").innerText
let customer=document.getElementById("customer").value

let text="Taxi Invoice - GET TAXI KOVAI\nCustomer: "+customer+"\nTotal: ₹"+total

window.open("https://wa.me/?text="+encodeURIComponent(text))

}

</script>

</body>
</html>
